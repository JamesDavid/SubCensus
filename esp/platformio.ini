; SubCensusEsp — ESP32 + CC1101 headless node (PlatformIO). Spec: docs/SubCensusEsp_Spec.md.
; shared/core is compiled into the firmware via src/subcensus_core.c (unity build) so the
; shared C logic library stays the single source of truth (no copy/drift) — see that file.

[platformio]
src_dir = src
data_dir = data

[env:esp32dev]
; Pinned to a stable classic espressif32 (Arduino core 2.0.x) for a reliable framework fetch.
platform = espressif32 @ 6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
; expose shared/core headers to the C++ firmware
build_flags =
    -I../shared/core
    -DSUBCENSUS_ESP=1
board_build.filesystem = littlefs
; Libraries added per-milestone as needed. M1: async web server + WebSocket (M2) via the
; maintained esp32async fork; it pulls AsyncTCP.
lib_deps =
    esp32async/ESPAsyncWebServer @ ^3.11.0
    esp32async/AsyncTCP @ ^3.4.0
