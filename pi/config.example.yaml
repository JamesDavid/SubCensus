# SubCensusPi config (Pi §8). Copy to config.yaml and edit for your host.
dongles:
  - serial: ""              # rtl_433 -d :<serial>; empty = first/default dongle
    freqs: [433.92M, 915M, 315M]
    gain: auto
    ppm: 0
    hop_seconds: 30         # single-dongle hop across the freqs above
capture_unknowns: false     # save IQ/pulse for undecoded bursts (M4; disk-guarded)
capture_samples: true       # DEFAULT ON: save every detected burst as a raw .cu8 in the place iq
                            # dir (rtl_433 -S all) so any burst can be re-matched against EVERY
                            # decoder later from the device page (System §6). Rolling window.
max_samples_gb: 2           # prune oldest samples past this cap (never fills the SD card)
max_events: 500000          # rolling-window retention for the events log (0 = keep forever);
                            # device roll-ups (count / cadence) survive pruning
prioritize_watchlist: false # opt-in: reorder hop/dongle attention by the place watchlist (§3)
place: home                 # active Place profile (§9a); stamps all records
places_dir: /var/lib/subcensuspi/places
signatures_dir: /var/lib/subcensuspi/signatures   # GLOBAL brain, shared with the Zero
iq_dir: /var/lib/subcensuspi/iq
max_iq_gb: 20
db_path: /var/lib/subcensuspi/census.db
mqtt:
  enabled: false
  host: 127.0.0.1
  port: 1883
  ha_discovery: true
  base_topic: subcensuspi
web:
  host: 0.0.0.0
  port: 8080
